<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Filter</title>
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe Hands + utilities from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="ui-panel">
    <div id="filter-group">
      <span class="group-label">Filter</span>
      <label class="filter-btn active"><input type="radio" name="filter" value="grayscale" checked> Grayscale</label>
      <label class="filter-btn"><input type="radio" name="filter" value="sepia"> Sepia</label>
      <label class="filter-btn"><input type="radio" name="filter" value="cool"> Cool Tint</label>
      <label class="filter-btn"><input type="radio" name="filter" value="warm"> Warm Tint</label>
      <label class="filter-btn"><input type="radio" name="filter" value="invert"> Invert (mild)</label>
    </div>
    <div id="action-group">
      <button id="btn-remove-last">Remove Last Zone</button>
      <button id="btn-clear-all">Clear All Zones</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
